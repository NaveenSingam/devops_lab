apiVersion: apps/v1
kind: Deployment
metadata:
    name: my-deployment
spec:
    replicas: 2
    selector:
        matchLabels:
            app: my-deploy
    template:
        metadata:
            labels:
                app: my-deploy
        
        containers:
        - name: my-container
          image: b211626/node-docker-app:${BUILD_NUMBER}
          imagePullPolicy: Never
          ports:
          - containerPort: 8000
           
